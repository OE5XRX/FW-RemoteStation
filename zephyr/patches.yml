# Downstream patches applied to west modules via 'west patch apply'.
# Keep this list minimal; each entry should be upstreamable and tracked.
patches:
  - path: zephyr/0001-udc-stm32-isochronous-incomplete-recovery.patch
    sha256sum: 7d4607eef7ccb89ee1d16aa6a79f9d87796bc61623c5eb9ad115184ec3cb0fb7
    module: zephyr
    author: Peter Buchegger
    email: peter.buchegger7@gmail.com
    date: 2026-07-15
    upstreamable: true
    issue: https://github.com/zephyrproject-rtos/zephyr/pull/113622
    comments: >
      STM32 OTG-FS UDC never implemented HAL_PCD_ISOOUTIncompleteCallback, so
      isochronous OUT reception (UAC2 host->device playback) stalls permanently after
      the first missed frame. Re-arm the pending receive (net_buf_tail/tailroom) to
      resync even/odd frame parity. Fixes UAC2 playback on fm_board (STM32U575).
      Submitted upstream as PR #113622. Iso IN degrades gracefully; IN recovery is a
      follow-up.
