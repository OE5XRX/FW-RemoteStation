description: |
  Hardware-timed analog audio capture: a timer TRGO drives periodic ADC
  conversions into a circular DMA buffer. STM32-specific.

compatible: "oe5xrx,analog-audio-in"

include: base.yaml

properties:
  io-channels:
    type: phandle-array
    required: true
    description: ADC instance + channel used for the audio input.
  io-channel-names:
    type: string-array
    required: false
    description: Optional names for io-channels (e.g. "audio_in").
  sampling-timer:
    type: phandle
    required: true
    description: Timer node whose TRGO paces conversions (master-mode = UPDATE).
  dmas:
    type: phandle-array
    required: true
    description: RX DMA channel that moves ADC conversions into the circular buffer.
  dma-names:
    type: string-array
    required: true
    description: Name for the RX DMA channel (must include "rx").
  sampling-frequency:
    type: int
    required: true
    description: Sample rate in Hz (e.g. 8000).
  resolution:
    type: int
    required: true
    description: ADC resolution in bits (e.g. 12).
  block-samples:
    type: int
    required: true
    description: Samples per DMA half-buffer / per consumer callback.
