# Native Simulator Board Configuration (native_sim_native_64.conf)
# Hardware emulator configuration for x86_64 native simulator platform.
# Enables emulated peripherals for SA818 driver development and testing
# without physical hardware. Software-level configs belong in app/prj.conf.

# =============================================================================
# Emulated Peripheral Hardware
# =============================================================================

# ADC Emulator - SA818 audio level monitoring (RX audio)
CONFIG_ADC=y
CONFIG_ADC_EMUL=y

# GPIO Emulator - SA818 control signals (power, PTT, high/low power, squelch)
CONFIG_GPIO=y
CONFIG_GPIO_EMUL=y

# WAV DAC Emulator - Writes TX audio to WAV file for analysis
CONFIG_DAC_WAV=y

CONFIG_EEPROM=y

# =============================================================================
# Native Simulator UART
# =============================================================================
# UART PTY (pseudo-terminal) is automatically configured by native_sim.
# Use 'screen <pty_path>' to interact with SA818 AT command interface.
