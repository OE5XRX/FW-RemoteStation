# Native Simulator Board-Specific Configuration
# Additional settings for native_sim/native/64 platform
# Enables hardware emulators for SA818 driver development

# =============================================================================
# Hardware Emulators
# =============================================================================

# GPIO Emulator - Required for SA818 control signals
# (power, PTT, H/L power, squelch). Audio is STM32-only (LL+DMA) and not
# instantiated on native_sim, so no ADC/DAC emulator is needed.
CONFIG_GPIO_EMUL=y

# =============================================================================
# UART Configuration
# =============================================================================
# UART PTY is automatically configured by native_sim
