# Sysbuild configuration for fm_board MCUboot + application build.
# This file is picked up automatically when building with --sysbuild.

# Build MCUboot together with the signed application.
SB_CONFIG_BOOTLOADER_MCUBOOT=y

# Swap-using-offset: scratch-less, interrupt-safe rollback (current Zephyr default).
SB_CONFIG_MCUBOOT_MODE_SWAP_USING_OFFSET=y

# ECDSA-P256 signatures (HW-accelerated by the U5 PKA in future; tinycrypt for now).
SB_CONFIG_BOOT_SIGNATURE_TYPE_ECDSA_P256=y

# M0/M1 bringup: MCUboot's insecure development key (root-ec-p256.pem in mcuboot tree).
# Replaced with a project key in Task 8. DO NOT SHIP THIS.
