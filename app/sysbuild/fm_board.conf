# MCUBoot Configuration for FM Board (STM32U575CITx)
# Board-specific hardware settings for Swap using Move

# =============================================================================
# STM32 Hardware Configuration
# =============================================================================

# STM32U575 flash sector size is 4KB
# Primary slot: 964KB = 241 sectors
# Secondary slot: 960KB = 240 sectors

# STMicroelectronics serial flash driver
CONFIG_STM32_UART_LOGGING_ENABLED=y

# =============================================================================
# Flash Access
# =============================================================================

# STM32 internal flash
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# =============================================================================
# Minimal Console Output
# =============================================================================

# Basic console for bootloader messages
CONFIG_CONSOLE=y
CONFIG_CONSOLE_HANDLER_SHELL256=y

# Log level: Info
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# =============================================================================
# Image Requirements
# =============================================================================

# Require signed images
CONFIG_MCUBOOT_SHELL=n


CONFIG_SHELL=y
CONFIG_SERIAL=y
CONFIG_I2C=y
