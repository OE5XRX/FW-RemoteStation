#
# Application-image Kconfig fragment applied by sysbuild for the prod build.
# This file is picked up automatically as app/sysbuild/<image-name>.conf
# (image name = "app") when building with --sysbuild.  It is NOT included in
# the bare build (west build -b fm_board app), keeping those symbols absent
# from the bare .config.
#
# In the bare build the app links at 0x0 and owns the whole flash.  Enabling
# DFU there would let a dfu-util write to slot1 (0x100000) and corrupt the
# running image — a real footgun.  These symbols are prod-only.

# =============================================================================
# Firmware update — USB DFU flash backend targeting slot1
# =============================================================================
# These symbols wire the built-in Zephyr USBD_DFU flash backend
# (subsys/usb/device_next/class/usbd_dfu_flash.c) so that a DFU download
# writes to slot1_partition; MCUboot swaps to slot0 on the next reset.
#
# STM32U575 internal flash: 2 MiB total, 8 KiB (0x2000) pages.
# slot1_partition is 896 KiB (0xE0000).  IMG_ERASE_PROGRESSIVELY avoids the
# long up-front erase of slot1 (erasing all 896 KiB at DFU start would block
# for ~450 ms on 8 KiB pages; progressive erase spreads cost over the
# transfer).
#
# DO NOT set USB_DFU_PERMANENT_DOWNLOAD — we want the test/confirm cycle so a
# bad image auto-reverts on the next watchdog-induced reset.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH=y
CONFIG_IMG_MANAGER=y
CONFIG_IMG_ERASE_PROGRESSIVELY=y
CONFIG_USBD_DFU_FLASH=y
CONFIG_USBD_DFU_FLASH_SLOT0=n
CONFIG_USBD_DFU_FLASH_SLOT1=y

# =============================================================================
# Health-gated boot confirm + watchdog
# =============================================================================
# CONFIG_REBOOT is selected automatically by CONFIG_TASK_WDT.
# CONFIG_WATCHDOG enables the Zephyr WDT driver subsystem needed by task_wdt
# when it uses a hardware WDT as its fallback (the IWDG node in fm_board.dts
# already has status = "okay").
CONFIG_WATCHDOG=y
CONFIG_TASK_WDT=y
