# MCUBoot Bootloader Configuration
# Swap using move (without scratch) - reduced flash usage

# =============================================================================
# Image Swap Strategy - Move without Scratch
# =============================================================================

# Use swap using move algorithm (no dedicated scratch area)
# Primary slot is one sector larger than secondary slot
#CONFIG_MCUBOOT_SWAP_USING_MOVE=y

# This disables swap-using-scratch algorithm in favor of the more
# efficient swap-using-move approach
#CONFIG_MCUBOOT_SWAP_USING_SCRATCH=n

# =============================================================================
# Hash & Signature Verification
# =============================================================================

# All images must be signed
#CONFIG_MCUBOOT_WITH_ECC256=y

# =============================================================================
# Image Trailer & Status
# =============================================================================

# Maximum number of sectors for image swapping
# STM32U575: 2MB Flash = 512 sectors of 4KB each
#CONFIG_MCUBOOT_MAX_IMG_SECTORS=128

# =============================================================================
# Performance Optimization
# =============================================================================

# Validate primary slot image once (faster boot on repeated boots)
#CONFIG_MCUBOOT_VALIDATE_PRIMARY_SLOT_ONCE=y

# =============================================================================
# Watchdog & Timeout
# =============================================================================

# Enable watchdog during swap operations
#CONFIG_MCUBOOT_WATCHDOG=y

# =============================================================================
# Logging (minimal)
# =============================================================================

# Bootloader logging level: Info (show swap operations)
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3


CONFIG_SHELL=y
CONFIG_SERIAL=y
CONFIG_I2C=y
CONFIG_MBEDTLS=y
