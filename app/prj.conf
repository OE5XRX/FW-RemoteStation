# FM Board Application Configuration
# Main project configuration for SA818-based FM transceiver

# =============================================================================
# Language & Standard Library
# =============================================================================
CONFIG_CPP=y
CONFIG_STD_CPP20=y
CONFIG_EXTERNAL_LIBCPP=y

# =============================================================================
# Console & Serial
# =============================================================================
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y

# =============================================================================
# Shell Interface
# =============================================================================
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_PROMPT_UART="fm> "

# Shell subsystem commands
CONFIG_KERNEL_SHELL=y
CONFIG_DEVICE_SHELL=y

# =============================================================================
# Storage
# =============================================================================
CONFIG_EEPROM=y
CONFIG_EEPROM_SHELL=y

# =============================================================================
# Peripherals
# =============================================================================

# ADC - Audio input monitoring
CONFIG_ADC=y
CONFIG_ADC_SHELL=y

# DAC - Audio output
CONFIG_DAC=y

# GPIO - SA818 control signals
CONFIG_GPIO=y
CONFIG_GPIO_SHELL=y

# UART - SA818 AT command interface
CONFIG_UART_INTERRUPT_DRIVEN=y

# =============================================================================
# Radio Driver
# =============================================================================
CONFIG_SA818=y
CONFIG_SA818_SHELL=y

# =============================================================================
# Logging
# =============================================================================
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_UART=y

# =============================================================================
# Embedded Template Library (ETL)
# =============================================================================
# No-alloc fixed-capacity containers (etl::string/vector/map...). ETL routes
# runtime errors to a registered handler (see app/src/etl_error_handler.cpp)
# instead of throwing (exceptions stay disabled).
CONFIG_ETL=y
CONFIG_ETL_LOG_ERRORS=y

# =============================================================================
# Module Platform (self-describing capability interface)
# =============================================================================
# Ship the SAME interface the Twister suite tests: `module fm describe` must
# answer on the shipped app binary, not only in tests/sim_shell. MODULE_SA818
# depends on SA818 (enabled above) and selects CBPRINTF_FP_SUPPORT (needed for
# the %.4f floats in MODULE-RESULT).
CONFIG_MODULE=y
CONFIG_MODULE_SA818=y

# =============================================================================
# Firmware update — USB DFU flash backend targeting slot1
# =============================================================================
# These symbols wire the built-in Zephyr USBD_DFU flash backend
# (subsys/usb/device_next/class/usbd_dfu_flash.c) so that a DFU download
# writes to slot1_partition; MCUboot swaps to slot0 on the next reset.
#
# In the bare build (no sysbuild / no MCUboot) the DFU class still enumerates
# (CONFIG_USBD_DFU is set in the board defconfig), but without a valid MCUboot
# trailer the swap never executes — which is the correct no-op behaviour.
# IMG_ERASE_PROGRESSIVELY avoids the long up-front erase of slot1 (2 MiB
# internal flash has 4 KiB pages; erasing all 480 KiB at DFU start would block
# for ~250 ms; progressive erase spreads cost over the transfer).
#
# DO NOT set USB_DFU_PERMANENT_DOWNLOAD — we want the test/confirm cycle so a
# bad image auto-reverts on the next watchdog-induced reset.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH=y
CONFIG_IMG_MANAGER=y
CONFIG_IMG_ERASE_PROGRESSIVELY=y
CONFIG_USBD_DFU_FLASH=y
CONFIG_USBD_DFU_FLASH_SLOT0=n
CONFIG_USBD_DFU_FLASH_SLOT1=y

# =============================================================================
# Health-gated boot confirm + watchdog
# =============================================================================
# CONFIG_REBOOT is selected automatically by CONFIG_TASK_WDT.
# CONFIG_WATCHDOG enables the Zephyr WDT driver subsystem needed by task_wdt
# when it uses a hardware WDT as its fallback (the IWDG node in fm_board.dts
# already has status = "okay").
CONFIG_WATCHDOG=y
CONFIG_TASK_WDT=y
