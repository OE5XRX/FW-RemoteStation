# FM Board Application Configuration (prj.conf)
# Software-level configuration for SA818-based FM transceiver application.
# This file contains software features, debug settings, logging, and shell
# configuration. Hardware-specific configs belong in board defconfig files.

# =============================================================================
# Build & Debug Configuration
# =============================================================================

# Debug optimization level (-Og) - better debugging experience
CONFIG_DEBUG_OPTIMIZATIONS=y

# Thread debugging information
CONFIG_DEBUG_THREAD_INFO=y

# =============================================================================
# Language & Standard Library
# =============================================================================

CONFIG_CPP=y
CONFIG_STD_CPP20=y
CONFIG_EXTERNAL_LIBCPP=y

# =============================================================================
# Console & Shell Interface
# =============================================================================

# Shell subsystem - interactive command line
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_PROMPT_UART="fm> "

# Built-in shell commands
CONFIG_KERNEL_SHELL=y          # Kernel commands (threads, memory, etc.)
CONFIG_DEVICE_SHELL=y          # Device tree inspection
CONFIG_GPIO_SHELL=y            # GPIO control and monitoring
CONFIG_EEPROM_SHELL=y          # EEPROM read/write commands

# =============================================================================
# Peripheral Drivers - Software Features
# =============================================================================

# UART interrupt-driven mode for better performance
CONFIG_UART_INTERRUPT_DRIVEN=y

# =============================================================================
# Radio Driver
# =============================================================================

CONFIG_SA818=y
CONFIG_SA818_SHELL=y

# =============================================================================
# Logging Configuration
# =============================================================================

# Core logging
CONFIG_LOG=y
# Info level (0=Off, 1=Err, 2=Wrn, 3=Inf, 4=Dbg)
CONFIG_LOG_DEFAULT_LEVEL=3
