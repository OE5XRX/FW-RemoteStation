name: CI

on:
  pull_request:
  push:
    branches: main

jobs:
  clang_format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format-18
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-18
          sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-18 180
          clang-format --version

      - name: clang-format check
        shell: bash
        run: |
          set -euo pipefail
          PATHS=("app" "boards" "tests")
          mapfile -t FILES < <(
            find "${PATHS[@]}" -type f \( \
              -name "*.c" -o -name "*.h" \
              -o -name "*.cc" -o -name "*.hh" \
              -o -name "*.cpp" -o -name "*.hpp" \
            \) -print
          )
          [ "${#FILES[@]}" -eq 0 ] && exit 0
          clang-format -i "${FILES[@]}"
          git diff --quiet || (echo "::error::clang-format produced changes"; git --no-pager diff --name-only; exit 1)

  build_and_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: fw

      - name: Setup Zephyr
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: fw
          toolchains: arm-zephyr-eabi

      - name: West sanity
        shell: bash
        run: |
          set -euo pipefail
          west --version
          west list

      - name: Apply downstream Zephyr patches
        working-directory: fw
        shell: bash
        run: |
          set -euo pipefail
          # Carries our downstream fixes to west modules (see zephyr/patches.yml),
          # e.g. the STM32 UDC isochronous-incomplete recovery needed for UAC2 playback.
          west patch apply

      - name: Build native_sim
        working-directory: fw
        shell: bash
        run: |
          set -euo pipefail
          west build -b native_sim/native/64 app -p always

      - name: Twister integration build (app/)
        working-directory: fw
        shell: bash
        run: |
          set -euo pipefail
          west twister -T app --integration -v --inline-logs

      - name: Twister system tests (shell)
        working-directory: fw
        shell: bash
        run: |
          set -euo pipefail
          west twister -T tests/sim_shell -p native_sim/native/64 -v --inline-logs

      - name: Twister ETL proof (tests/etl)
        working-directory: fw
        shell: bash
        run: |
          set -euo pipefail
          west twister -T tests/etl -p native_sim/native/64 -v --inline-logs

      - name: Twister boot-confirm / health-gate (tests/boot_confirm)
        working-directory: fw
        shell: bash
        run: |
          set -euo pipefail
          west twister -T tests/boot_confirm -p native_sim/native/64 -v --inline-logs

      - name: Build fm_board (USB composite)
        working-directory: fw
        shell: bash
        run: |
          set -euo pipefail
          west build -b fm_board/stm32u575xx app -p always

      - name: Twister USB composite build (tests/usb_audio)
        working-directory: fw
        shell: bash
        run: |
          set -euo pipefail
          west twister -T tests/usb_audio -p fm_board/stm32u575xx --build-only -v --inline-logs

      - name: Twister unit tests (tests/unit_audio)
        working-directory: fw
        shell: bash
        run: |
          set -euo pipefail
          west twister -T tests/unit_audio -p native_sim/native/64 -v --inline-logs

  prod_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: fw

      - name: Setup Zephyr
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: fw
          toolchains: arm-zephyr-eabi

      - name: Install MCUboot pip requirements
        # west packages pip lists all requirement files declared by west modules;
        # bootloader/mcuboot/zephyr/requirements.txt is included and brings imgtool,
        # which is required by the sysbuild signing step. The base action-zephyr-setup
        # does not run this automatically, so we do it explicitly here.
        working-directory: fw
        shell: bash
        # action-zephyr-setup puts its venv on PATH but does not set VIRTUAL_ENV,
        # and the runner's pip has require-virtualenv enabled -> pip refuses with
        # "Running pip install outside of a virtual environment". Disabling the
        # guard for this step lets `west` (venv python) install into that venv,
        # which is where the sysbuild signing step looks for imgtool.
        env:
          PIP_REQUIRE_VIRTUALENV: "false"
        run: |
          set -euo pipefail
          west packages pip --install

      - name: Apply downstream Zephyr patches
        working-directory: fw
        shell: bash
        run: |
          set -euo pipefail
          west patch apply

      - name: Build prod (MCUboot + signed app, dev key)
        # sysbuild pulls in MCUboot and signs the application image.
        # sysbuild.conf sets SB_CONFIG_BOOT_SIGNATURE_TYPE_ECDSA_P256=y and does NOT
        # set SB_CONFIG_BOOT_SIGNATURE_KEY_FILE, so MCUboot's built-in dev key is used —
        # safe for CI; the production key lives outside the repo (git-ignored, injected
        # only for release builds).
        working-directory: fw
        shell: bash
        run: |
          set -euo pipefail
          west build -b fm_board --sysbuild app

      - name: Assert signed artifacts exist
        working-directory: fw
        shell: bash
        run: |
          set -euo pipefail
          test -f build/app/zephyr/zephyr.signed.bin
          test -f build/mcuboot/zephyr/zephyr.hex
