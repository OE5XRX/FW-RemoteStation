name: Release

# One-button manual release. Computes the next YY.MM.DD-NN, stamps app/VERSION,
# iterates release-targets.yaml (real + static native_sim), smoke-tests, cosign
# keyless-signs, emits SHA256SUMS, then commits the stamp + tags + publishes.
# dry_run builds + smokes everything but skips commit/tag/publish.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build + smoke only; do not commit/tag/publish"
        type: boolean
        default: false

permissions:
  contents: write     # push stamp commit + tag, create release
  id-token: write     # cosign keyless OIDC

concurrency:
  group: fw-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Guard — real release only on the default branch
        if: ${{ !inputs.dry_run }}
        env:
          REF_NAME: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          if [ "${REF_NAME}" != "${DEFAULT_BRANCH}" ]; then
            echo "::error::A real (non-dry-run) release must run on the default branch (${DEFAULT_BRANCH}), not '${REF_NAME}'. Re-run with dry_run=true on feature branches, or dispatch on ${DEFAULT_BRANCH}." >&2
            exit 1
          fi
          echo "OK — releasing from default branch ${REF_NAME}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: fw
          fetch-depth: 0        # need tags to compute NN
          persist-credentials: true

      - name: Compute version
        id: ver
        working-directory: fw
        run: |
          set -euo pipefail
          git fetch --tags --quiet
          today=$(date -u +%y.%m.%d)                 # e.g. 26.07.04
          # Next sequence = (max existing NN for today) + 1, NOT a count: tags
          # can be non-contiguous (e.g. -01 and -03), where a count would pick
          # an already-used NN and the tag push would collide.
          maxnn=$(git tag -l "${today}-*" | sed -nE "s/.*-0*([0-9]+)$/\1/p" | sort -n | tail -1)
          nn=$(printf '%02d' $(( ${maxnn:-0} + 1 )))
          version="${today}-${nn}"
          IFS=. read -r yy mm dd <<< "$today"
          {
            echo "version=${version}"
            echo "major=$((10#$yy))"
            echo "minor=$((10#$mm))"
            echo "patch=$((10#$dd))"
            echo "tweak=$((10#$nn))"
          } >> "$GITHUB_OUTPUT"
          echo "Release version: ${version}"

      - name: Stamp app/VERSION
        working-directory: fw
        env:
          MAJOR: ${{ steps.ver.outputs.major }}
          MINOR: ${{ steps.ver.outputs.minor }}
          PATCH: ${{ steps.ver.outputs.patch }}
          TWEAK: ${{ steps.ver.outputs.tweak }}
        run: |
          set -euo pipefail
          cat > app/VERSION <<EOF
          VERSION_MAJOR = ${MAJOR}
          VERSION_MINOR = ${MINOR}
          PATCHLEVEL = ${PATCH}
          VERSION_TWEAK = ${TWEAK}
          EXTRAVERSION =
          EOF
          cat app/VERSION

      - name: Setup Zephyr
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: fw
          toolchains: arm-zephyr-eabi

      - name: Apply downstream Zephyr patches
        working-directory: fw
        # action-zephyr-setup runs `west update`, which resets modules and drops
        # any patches. Re-apply them (e.g. the STM32 UDC iso-OUT recovery patch
        # required for UAC2 TX audio on fm_board) before building release images.
        run: west patch apply

      - name: Install MCUboot signing deps (imgtool)
        working-directory: fw
        # west packages pip --install refuses to run outside a virtual environment
        # (a west-level guard, independent of pip's require-virtualenv setting) and
        # the action-zephyr-setup venv does not set VIRTUAL_ENV, so west rejects it.
        # Installing imgtool directly with python -m pip bypasses west's guard and
        # lands imgtool (+ its deps: cryptography, cbor2, intelhex, click) in the
        # same venv used by the sysbuild signing step.
        run: python -m pip install --break-system-packages imgtool

      - name: Install static link deps
        run: sudo apt-get update && sudo apt-get install -y libc6-dev

      - name: Install cosign
        if: ${{ !inputs.dry_run }}
        uses: sigstore/cosign-installer@v3

      - name: Ensure yq
        run: |
          set -euo pipefail
          # The build loop uses mikefarah yq v4 syntax. A preinstalled yq of a
          # different flavor (e.g. the python/kislyuk yq) or major version would
          # silently mis-parse. Only accept mikefarah v4 already on PATH; else
          # install a pinned, checksum-verified binary to /usr/local/bin (which
          # precedes /usr/bin, so it wins).
          if ! { command -v yq >/dev/null 2>&1 && yq --version 2>&1 | grep -Eq 'mikefarah.* v4\.'; }; then
            YQ_VER=v4.44.6
            YQ_SHA=0c2b24e645b57d8e7c0566d18643a6d4f5580feeea3878127354a46f2a1e4598
            wget -qO /tmp/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VER}/yq_linux_amd64"
            echo "${YQ_SHA}  /tmp/yq" | sha256sum -c -
            sudo install -m 0755 /tmp/yq /usr/local/bin/yq
          fi
          yq --version

      - name: Build all targets
        working-directory: fw
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p release/out
          mem="release/out/MEMORY-USAGE.md"
          printf '# FW-RemoteStation memory usage — %s\n\n' "$VERSION" > "$mem"
          count=$(yq -r '.targets | length' release/release-targets.yaml)
          for i in $(seq 0 $((count - 1))); do
            name=$(yq -r ".targets[$i].name"  release/release-targets.yaml)
            board=$(yq -r ".targets[$i].board" release/release-targets.yaml)
            band=$(yq -r ".targets[$i].band"  release/release-targets.yaml)
            overlay="$PWD/release/overlays/band_${band}.overlay"
            arts=$(yq -r ".targets[$i].artifacts[]" release/release-targets.yaml)
            echo "== ${name} (board=${board} band=${band}) =="

            for art in $arts; do
              if [ "$art" = "firmware" ]; then
                # --- Debug / bare build (linked @0x0, no bootloader, unsigned) ---
                # tee the build so we can lift Zephyr's FLASH/RAM memory report.
                west build -b "$board" app -p always -- -DEXTRA_DTC_OVERLAY_FILE="$overlay" \
                  2>&1 | tee "/tmp/build-${name}.log"
                cp build/zephyr/zephyr.bin "release/out/${name}.bin"
                cp build/zephyr/zephyr.elf "release/out/${name}.elf"

                # --- Production DFU build: MCUboot + signed app ---
                # Signed with MCUboot's built-in DEV key for now (no
                # SB_CONFIG_BOOT_SIGNATURE_KEY_FILE). Switch to the OE5XRX key
                # later by materializing it from a secret and adding
                # -DSB_CONFIG_BOOT_SIGNATURE_KEY_FILE=... below. The band overlay
                # must target the app image under sysbuild (app_ prefix).
                west build -b "$board" --sysbuild app -p always -d build-signed -- \
                  -Dapp_EXTRA_DTC_OVERLAY_FILE="$overlay"
                cp build-signed/app/zephyr/zephyr.signed.bin "release/out/${name}.signed.bin"
                cp build-signed/mcuboot/zephyr/zephyr.hex     "release/out/${name}.mcuboot.hex"
                # Memory-usage overview: the "Memory region" table (FLASH/RAM/...)
                # Zephyr prints on link. ANSI-stripped; header through first blank.
                {
                  printf '## %s — board %s, band %s (real firmware)\n\n```\n' "$name" "$board" "$band"
                  sed 's/\x1b\[[0-9;]*m//g' "/tmp/build-${name}.log" \
                    | awk '/Memory region/{print; f=1; next}
                           f && /^ *[A-Za-z0-9_]+: +[0-9]/ {print; next}
                           f {exit}'
                  printf '```\n\n'
                } >> "$mem"
              elif [ "$art" = "native_sim" ]; then
                west build -b native_sim/native/64 app -p always -- \
                  -DEXTRA_DTC_OVERLAY_FILE="$overlay" \
                  -DEXTRA_CONF_FILE="$PWD/release/native_sim_static.conf"
                cp build/zephyr/zephyr.exe "release/out/${name}.native_sim"
                ./scripts/release_smoke.sh "release/out/${name}.native_sim" "$VERSION" "$band"
                # native_sim is a host binary (no MCU regions); record on-disk size.
                printf '## %s.native_sim — host binary (static): %s\n\n' \
                  "$name" "$(du -h "release/out/${name}.native_sim" | cut -f1)" >> "$mem"
              fi
            done
          done
          ls -lh release/out/
          # Surface the overview on the run's summary page too.
          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then cat "$mem" >> "$GITHUB_STEP_SUMMARY"; fi

      - name: Generate SHA256SUMS
        working-directory: fw/release/out
        run: |
          set -euo pipefail
          shopt -s nullglob
          # Collect whatever assets were actually produced. A future target may
          # emit only a subset (e.g. native_sim-only), so an unmatched glob must
          # vanish (nullglob) rather than survive literally and break sha256sum.
          assets=( *.bin *.elf *.hex *.native_sim )
          if [ ${#assets[@]} -eq 0 ]; then
            echo "::error::no release assets were produced" >&2
            exit 1
          fi
          sha256sum "${assets[@]}" > SHA256SUMS
          cat SHA256SUMS

      - name: Sign assets (cosign keyless)
        if: ${{ !inputs.dry_run }}
        working-directory: fw/release/out
        run: |
          set -euo pipefail
          shopt -s nullglob
          # nullglob drops any artifact class a future target didn't emit;
          # SHA256SUMS is a literal (always present) so it is always signed.
          for f in *.bin *.elf *.hex *.native_sim SHA256SUMS; do
            cosign sign-blob --yes --bundle "${f}.bundle" "${f}"
          done
          ls -lh

      # Attach the built artifacts to the workflow run itself, ALWAYS (dry-run
      # and real). This lets a dry_run=true build be downloaded and flashed /
      # simulated for testing without publishing a Release. On a real run these
      # same files are also published as signed Release assets below; here they
      # are just the run-scoped copy (bin/elf/native_sim + SHA256SUMS, plus the
      # cosign .bundle signatures when not a dry run).
      - name: Attach build artifacts to the run
        uses: actions/upload-artifact@v4
        with:
          name: fw-${{ steps.ver.outputs.version }}${{ inputs.dry_run && '-dryrun' || '' }}
          path: fw/release/out/*
          if-no-files-found: error
          retention-days: 90

      # No git push to the default branch: it is protected (PR-only). The
      # app/VERSION stamp is ephemeral — used only to build version-stamped
      # binaries this run — and is NOT committed. The version lives in the tag
      # + release + the binaries' app_version.h (same model as linux-image:
      # version == tag, no committed version file). The release action creates
      # the tag itself (target_commitish below), so no branch/tag push is needed.
      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: |
            fw/release/out/*
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## FW-RemoteStation ${{ steps.ver.outputs.version }}

            | Target | DFU update (signed) | Provisioning (SWD) | Debug (bare) | Debug ELF | Sim (static) |
            |---|---|---|---|---|---|
            | fm-sa818-2m (VHF/2m) | `fm-sa818-2m.signed.bin` | `fm-sa818-2m.mcuboot.hex` | `fm-sa818-2m.bin` | `fm-sa818-2m.elf` | `fm-sa818-2m.native_sim` |
            | fm-sa818-70cm (UHF/70cm) | `fm-sa818-70cm.signed.bin` | `fm-sa818-70cm.mcuboot.hex` | `fm-sa818-70cm.bin` | `fm-sa818-70cm.elf` | `fm-sa818-70cm.native_sim` |

            **`.signed.bin`** = DFU update image (MCUboot, currently signed with the MCUboot **dev key** — not yet an OE5XRX production key);
            `.mcuboot.hex` = bootloader for one-time SWD provisioning; `.bin`/`.elf` = bare debug build.
            Each asset ships a cosign `.bundle` signature; `SHA256SUMS` covers the build artifacts.
            The firmware reports this version at runtime via the `version` shell command.
